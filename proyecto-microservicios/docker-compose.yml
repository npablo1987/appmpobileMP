version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-core:
    build:
      context: ./app-core
      dockerfile: Dockerfile
    container_name: app-core
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8001:8001"
    networks:
      - microservices-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  app-pagos:
    build:
      context: ./app-pagos
      dockerfile: Dockerfile
    container_name: app-pagos
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_WEBHOOK_URL: ${MP_WEBHOOK_URL}
      MP_SUCCESS_URL: ${MP_SUCCESS_URL}
      MP_FAILURE_URL: ${MP_FAILURE_URL}
      MP_PENDING_URL: ${MP_PENDING_URL}
    ports:
      - "8002:8002"
    networks:
      - microservices-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  app-notificaciones:
    build:
      context: ./app-notificaciones
      dockerfile: Dockerfile
    container_name: app-notificaciones
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8003:8003"
    networks:
      - microservices-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_data:
